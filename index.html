<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            text-align: center;
            padding: 40px;
            border-radius: 12px;
            background: #1e293b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            margin-bottom: 10px;
        }
        p {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>hi</h1>
        <p></p>
        <p id="time"></p>
    </div>

    <script>
        const timeEl = document.getElementById("time");
        const now = new Date();
        timeEl.textContent = "Loaded at: " + now.toLocaleString();
    </script>
</body>
</html>
